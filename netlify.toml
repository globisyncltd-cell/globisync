# Netlify configuration for globisync.com
# Owns: build settings, /api proxy to backend, SPA fallback, legacy 301 redirects

[build]
  base    = "frontend"
  command = "yarn install --frozen-lockfile && yarn build"
  publish = "build"

[build.environment]
  # Empty → frontend uses relative /api/ paths, proxied by the rule below
  REACT_APP_BACKEND_URL = ""
  NODE_VERSION          = "20"
  YARN_VERSION          = "1.22.22"
  CI                    = "false"

# ------------------------------------------------------------------
# Proxy all /api/* to the FastAPI backend
# NOTE: change this URL when you move the backend to a permanent host
# (Render / Railway / Fly / etc.) — this preview URL is temporary but stable.
# ------------------------------------------------------------------
[[redirects]]
  from   = "/api/*"
  to     = "https://globisync-new-site.preview.emergentagent.com/api/:splat"
  status = 200
  force  = true

[[redirects]]
  from   = "/sitemap.xml"
  to     = "https://globisync-new-site.preview.emergentagent.com/api/sitemap.xml"
  status = 200
  force  = true

# ------------------------------------------------------------------
# Legacy route redirects (permanent 301) — clean up old Google-indexed URLs
# ------------------------------------------------------------------
[[redirects]]
  from = "/home"
  to = "/"
  status = 301

[[redirects]]
  from = "/services"
  to = "/ecommerce"
  status = 301

[[redirects]]
  from = "/services-1"
  to = "/ecommerce"
  status = 301

[[redirects]]
  from = "/fee-calculator"
  to = "/"
  status = 301

[[redirects]]
  from = "/case-studies"
  to = "/"
  status = 301

[[redirects]]
  from = "/international-expansion"
  to = "/cross-border"
  status = 301

[[redirects]]
  from = "/markets"
  to = "/cross-border"
  status = 301

[[redirects]]
  from = "/faqs"
  to = "/"
  status = 301

[[redirects]]
  from = "/blog-3-1"
  to = "/blog"
  status = 301

[[redirects]]
  from = "/blog-3-1/*"
  to = "/blog"
  status = 301

# ------------------------------------------------------------------
# SPA fallback — must be the LAST redirect rule.
# Any URL that isn't an actual file gets index.html so React Router handles it.
# ------------------------------------------------------------------
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ------------------------------------------------------------------
# Security & caching headers
# ------------------------------------------------------------------
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options           = "SAMEORIGIN"
    X-Content-Type-Options    = "nosniff"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
